<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Game — Learning App</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="sidebar">
    <h2>Learning App</h2>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="typing.html">Typing</a></li>
            <li><a href="math.html" class="active">Math</a></li>
            <li><a href="memory.html">Memory</a></li>
            <li><a href="speak.html">Speak</a></li>
            <li><a href="ai.html">AI Chat</a></li>
            <li><a href="breathing.html">Breathing</a></li>
            <li><a href="settings.html">Settings</a></li>
        </ul>
    </nav>
</div>

<div class="content">
    <header class="header">Math Game</header>

    <section class="math-container">
        <div id="gameControls">
            <select id="difficultySelect">
                <option value="easy">Easy</option>
                <option value="medium">Medium</option>
                <option value="hard">Hard</option>
            </select>
            <button id="startBtn">Start Game</button>
            <button id="submitBtn" disabled>Submit Answer</button>
        </div>

        <div id="mathGrid" class="math-grid">
            <!-- 6 answer buttons generated by JS -->
        </div>

        <div id="messageBox" style="margin-top:16px; font-size:18px; color:var(--text);">
            Select difficulty and click Start!
        </div>
    </section>

    <footer>
        <p>© 2025 Learning App by Kade Bloxham. All rights reserved.</p>
        <p>Version 1.0.0</p>
        <p>Safe and professional for all learners.</p>
    </footer>
</div>

<script src="math.js"></script>
</body>
</html>
