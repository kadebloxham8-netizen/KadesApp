<!doctype html>
<html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Number Game — AutismAssist</title><link rel="stylesheet" href="css/styles.css"/></head>
<body>
  <aside class="sidebar card"><div class="brand">Kade Bloxham</div><div class="brand-sub">Number Game</div><nav class="nav-links"><a href="index.html">Home</a><a href="games.html">Games</a></nav></aside>

  <main>
    <div class="header"><div><div class="title">Number Game</div><div class="subtitle">Answer the questions — calm voice helps you along.</div></div></div>

    <section class="game-area">
      <div class="game-card number-game">
        <div id="question" class="number-display">Press Start</div>
        <input id="answerInput" class="number-input" type="number" placeholder="Type answer..." disabled>
        <div class="game-buttons">
          <button id="startBtn" class="btn">Start Game</button>
          <button id="submitBtn" class="btn" disabled>Submit</button>
          <button id="nextBtn" class="btn" disabled>Next</button>
        </div>

        <div class="progress-wrap"><div id="progressBar" class="progress-bar"></div></div>
        <div id="feedback" class="feedback"></div>
        <div style="margin-top:12px"><span id="scoreDisplay">Score: 0</span> • <span id="roundDisplay">Round: 0/8</span></div>
      </div>
    </section>
  </main>

  <script src="js/app.js"></script>
  <script src="js/number-game.js"></script>
</body>
</html>
