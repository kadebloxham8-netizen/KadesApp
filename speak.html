<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speak — Learning App</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>Learning App</h2>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="typing.html">Typing</a></li>
            <li><a href="math.html">Math</a></li>
            <li><a href="memory.html">Memory</a></li>
            <li><a href="speak.html" class="active">Speak</a></li>
            <li><a href="ai.html">AI Chat</a></li>
            <li><a href="breathing.html">Breathing</a></li>
            <li><a href="settings.html">Settings</a></li>
        </ul>
    </nav>
</div>

<!-- Main -->
<div class="content">
<header class="header">Speak Practice</header>

<section class="speak-container">

<!-- PRACTICE -->
<h2>Practice</h2>

<div class="button-group">
    <button onclick="setLevel('easy')">Easy</button>
    <button onclick="setLevel('medium')">Medium</button>
    <button onclick="setLevel('hard')">Hard</button>
</div>

<h2 id="prompt">Pick a level</h2>

<textarea id="output" placeholder="Your speech will appear here..."></textarea>

<div class="button-group">
    <button id="startBtn">Start</button>
    <button id="stopBtn">Stop</button>
</div>

<div class="button-group">
    <button id="nextBtn">Next</button>
    <button id="hearBtn">Hear It</button>
</div>

<p id="status">Waiting...</p>

<hr>

<!-- TEXT TO SPEECH -->
<h2>Text to Speech</h2>

<textarea id="textInput" placeholder="Type something..."></textarea>

<div class="voice-select-row">
    <select id="voiceSelect"></select>
    <button id="speakBtn">Speak</button>
</div>

</section>
</div>

<script src="speak.js"></script>
</body>
</html>
