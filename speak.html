<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speak — Learning App</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Sidebar Navigation -->
<div class="sidebar">
    <h2>Learning App</h2>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="typing.html">Typing</a></li>
            <li><a href="math.html">Math</a></li>
            <li><a href="memory.html">Memory</a></li>
            <li><a href="speak.html" class="active">Speak</a></li>
            <li><a href="ai.html">AI Chat</a></li>
            <li><a href="breathing.html">Breathing</a></li>
            <li><a href="settings.html">Settings</a></li>
        </ul>
    </nav>
</div>

<!-- Main Content -->
<div class="content">
    <header class="header">Text to Speech</header>

    <section class="speak-container">
        <textarea id="textInput" placeholder="Type something to speak..."></textarea>

        <div class="voice-select-row" style="margin-bottom:20px;">
            <select id="voiceSelect">
                <!-- JS will populate voices -->
            </select>
            <select id="langSelect">
                <option value="en-US">English</option>
                <option value="es-ES">Spanish</option>
                <option value="zh-CN">Chinese</option>
                <option value="it-IT">Italian</option>
            </select>
            <button id="speakBtn">Speak</button>
        </div>

        <div id="messageBox">Select a voice and language, then type text to speak.</div>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2025 Learning App by Kade Bloxham. All rights reserved.</p>
        <p>Version 1.0.0</p>
        <p>Safe and professional for all learners.</p>
    </footer>
</div>

<script src="speak.js"></script>
</body>
</html>
