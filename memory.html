<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Match Game — Learning App</title>
<link rel="stylesheet" href="styles.css">
<style>
/* Memory Game Specific Styles */
.memory-card-container {
    display: grid;
    grid-template-columns: repeat(4, 100px);
    grid-auto-rows: 100px;
    gap: 16px;
    justify-content: center;
    margin-top: 20px;
}

.memory-card {
    width: 100px;
    height: 100px;
    border-radius: 10px;
    background-color: #2563eb; /* Back of card */
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 40px;
    cursor: pointer;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.5s;
}

.memory-card.flipped {
    transform: rotateY(180deg);
}

.memory-card .front, .memory-card .back {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    border-radius: 10px;
}

.memory-card .front {
    background-color: #2563eb;
    color: #fff;
    font-size: 36px;
    transform: rotateY(180deg);
}

.memory-card .back {
    background-color: #dbeafe;
}

.game-controls {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 20px;
    flex-wrap: wrap;
}

.game-controls button {
    padding: 14px 22px;
    border-radius: 8px;
    border: none;
    background-color: #3b82f6;
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 200ms, transform 200ms;
}

.game-controls button:hover {
    background-color: #2563eb;
    transform: translateY(-2px);
}

#messageBox {
    text-align: center;
    font-size: 18px;
    font-weight: 500;
    color: #0f172a;
    min-height: 24px;
    margin-bottom: 12px;
}

.scoreboard {
    text-align: center;
    margin-bottom: 20px;
    font-size: 18px;
    color: #0f172a;
}
</style>
</head>
<body>
<!-- Sidebar -->
<div class="sidebar">
    <h2>Learning App</h2>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="typing.html">Typing</a></li>
        <li><a href="math.html">Math</a></li>
        <li><a href="memory.html" class="active">Memory</a></li>
        <li><a href="speak.html">Speak</a></li>
        <li><a href="ai.html">AI Chat</a></li>
        <li><a href="breathing.html">Breathing</a></li>
        <li><a href="settings.html">Settings</a></li>
    </ul>
</div>

<!-- Main Content -->
<div class="content">
    <header class="header">Memory Match Game</header>

    <div class="game-controls">
        <button id="startBtn">Start Game</button>
    </div>

    <div class="scoreboard">
        Wrong Guesses: <span id="wrongCount">0</span> | High Score: <span id="highScore">0</span>
    </div>

    <div id="messageBox">Click Start to play!</div>

    <div class="memory-card-container" id="cardContainer">
        <!-- Cards generated by JS -->
    </div>
</div>

<script src="memory.js"></script>
</body>
</html>
